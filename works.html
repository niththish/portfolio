<style>
    h2,i{
        color: #FF6D04;
    }
    #card{
        background-image: linear-gradient(45deg, #FFBA30, #FF6600);
        cursor: pointer;
        animation: cardAnimation 3s ease;
    }
    #link{
        background-color: white;
        color: #FF6D04;
        border-radius: 20px;
    }
    
    @keyframes cardAnimation {
        0%{
            transform: scale(0.7);
            opacity: 0.3;
        }
        100%{
            transform: scale(1);
            opacity: 1;
        }
    }

</style>

<nav-component></nav-component>
<div class="container">
    <div class="row pt-5">
        <div class="col-12 pt-2">
            <h2>My Works</h2>
        </div>
    </div>
    <div class="row">
        <div class="col-12 mb-3">
            <div class="card-columns mt-3">
                <div class="card shadow-lg" ng-repeat="work in works" id="card">
                    <div class="card-body">
                        <h4 class="card-title text-white">{{work.title}}</h4>
                        <p class="card-text text-white">{{work.description}}</p>
                        <a href="{{work.link}}" target="_blank" class="p-1 px-3" id="link">View source</a>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
</div>
